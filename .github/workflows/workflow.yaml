name: Pipeline CI/CD - Backend Java

on:
  pull_request:
    branches: [ "dev", "main" ] 
  push:
    branches: [ "main" ]

jobs:
  verificacao:
    name: Verificação de Código
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin' 
          cache: maven 

      - name: Verificar Compilação do Projeto
        run: mvn clean compile

      # (Opcional) Aqui entraria o Linter para achar "código lixo" e dead code.
      # Ferramentas como PMD, SpotBugs ou SonarQube. 
      # Exemplo se você adicionar o PMD no seu pom.xml:
      # - name: Análise Estática (Achar código morto)
      #   run: mvn pmd:check


  deploy:
    name: Fazer Deploy
    runs-on: ubuntu-latest
    needs: verificacao # O deploy SÓ ACONTECE se o Job de verificação passar!
    
    # Esta condição garante que o deploy só rode na MAIN e num evento de PUSH (ou merge aprovado)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Como você usa Docker, o deploy geralmente envolve fazer o build da imagem
      # e mandar para o seu servidor.
      - name: Fazer Build da Imagem Docker
        run: docker build -t meu-backend-java:latest .

      # AQUI VÃO OS PASSOS ESPECÍFICOS DO SEU SERVIDOR
      - name: Deploy para o Servidor
        run: |
          echo "Substitua esta linha pelos comandos de deploy da sua hospedagem"
          # Exemplo: ssh usuario@ip-do-servidor "docker pull e docker run..."